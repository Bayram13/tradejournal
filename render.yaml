services:
  - type: web
    name: trade-journal
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trade-journal-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.4"

databases:
  - name: trade-journal-db
    plan: free
